# Деплой на сервер через self-hosted GitHub Actions runner
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # Ручной запуск из вкладки Actions

jobs:
  deploy:
    # Запуск на вашем self-hosted runner (метки: self-hosted, Linux, X64)
    runs-on: [self-hosted, Linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_YANDEX_RASP_KEY: ${{ secrets.VITE_YANDEX_RASP_KEY || '' }}
        run: npm run build

      - name: Deploy (local sync on server)
        run: |
          set -e
          DEST="${{ secrets.DEPLOY_PATH }}"
          if [ -z "$DEST" ]; then
            echo "DEPLOY_PATH secret is empty. Set it (e.g. /var/www/dubna)."
            exit 1
          fi
          test -d "$DEST"
          rsync -av --delete dist/ "$DEST"/
          echo "Deploy finished successfully."
